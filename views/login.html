<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        body::before {
            content: ''; position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .login-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px; padding: 0 1.5rem;
        }

        .login-header { text-align: center; margin-bottom: 2rem; }

        .login-logo { height: 50px; margin-bottom: 1.5rem; opacity: 0.9; }

        .login-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.15);
            margin-bottom: 1rem;
            animation: glow 4s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 210, 255, 0.15); border-color: rgba(0, 210, 255, 0.4); }
            50% { box-shadow: 0 0 40px rgba(0, 210, 255, 0.3); border-color: rgba(0, 210, 255, 0.7); }
        }

        .login-title { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 0.25rem; }
        .login-title span { color: #00d2ff; }
        .login-subtitle { color: #8892b0; font-size: 0.9rem; }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.75rem;
            width: 100%; padding: 1rem 1.5rem;
            background: linear-gradient(135deg, #00d2ff, #0077b6);
            color: #fff; border: none; border-radius: 10px;
            font-size: 1.05rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            text-decoration: none;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4);
        }

        .login-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .login-divider {
            color: #5a6380; font-size: 0.8rem;
            margin: 1.25rem 0; position: relative;
        }

        .login-info {
            color: #5a6380; font-size: 0.8rem;
            margin-top: 1rem; line-height: 1.5;
        }

        .error-msg {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff6b6b; padding: 0.75rem 1rem;
            border-radius: 8px; font-size: 0.85rem;
            margin-bottom: 1rem; display: none;
        }

        .footer {
            position: relative; z-index: 1;
            margin-top: 2rem; color: #5a6380;
            font-size: 0.75rem; text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="/login/logo.png" alt="MoreNET" class="login-logo"><br>
            <img src="/login/nex.png" alt="NEX" class="login-avatar">
            <h1 class="login-title">Welcome to <span>NEX</span></h1>
            <p class="login-subtitle">Client Insights Portal</p>
        </div>

        <div class="login-card">
            <div class="error-msg" id="errorMsg"></div>

            <a href="/auth/start" class="login-btn">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Sign in with MoreNET SSO
            </a>

            <p class="login-info">
                You'll be redirected to the MoreNET identity provider to sign in securely.
            </p>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 MoreNET Internet Solutions. Powered by NEX ⚡
    </div>

    <script>
        // Show error if redirected back with error param
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error) {
            const errorMsg = document.getElementById('errorMsg');
            const messages = {
                'missing_params': 'Authentication failed — missing parameters.',
                'invalid_state': 'Authentication failed — invalid state. Please try again.',
                'token_failed': 'Authentication failed — could not verify your identity.',
                'userinfo_failed': 'Authentication failed — could not retrieve your profile.',
                'no_email': 'Authentication failed — no email address provided.',
                'server_error': 'Authentication failed — server error. Please try again.',
            };
            errorMsg.textContent = messages[error] || 'Authentication failed. Please try again.';
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
