<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX — Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; color: #e0e0e0;
        }

        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 2rem;
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .top-logo { height: 40px; }
        .top-right { display: flex; align-items: center; gap: 1rem; }
        .top-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(0, 210, 255, 0.4); }
        .nav-link {
            color: #8892b0; text-decoration: none; font-size: 0.85rem;
            padding: 0.4rem 0.8rem; border-radius: 6px; transition: all 0.2s;
        }
        .nav-link:hover { color: #00d2ff; background: rgba(0, 210, 255, 0.08); }
        .nav-link.active { color: #00d2ff; }
        .nav-link.logout:hover { color: #ff6b6b; background: rgba(255, 59, 48, 0.08); }

        .content { max-width: 960px; margin: 0 auto; padding: 5.5rem 1.5rem 2rem; }

        h1 { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 0.25rem; }
        h1 span { color: #00d2ff; }
        .page-subtitle { color: #8892b0; font-size: 0.9rem; margin-bottom: 2rem; }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .card-title {
            font-size: 1.1rem; font-weight: 700; color: #fff;
            margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .card-title .icon { color: #00d2ff; }

        .user-table { width: 100%; border-collapse: collapse; }
        .user-table th {
            text-align: left; padding: 0.6rem 0.75rem;
            color: #8892b0; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .user-table td {
            padding: 0.7rem 0.75rem; font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }
        .user-table tr:hover td { background: rgba(0, 210, 255, 0.03); }

        .badge {
            display: inline-block; padding: 0.15rem 0.5rem;
            border-radius: 10px; font-size: 0.75rem; font-weight: 600;
        }
        .badge-admin { background: rgba(0, 210, 255, 0.15); color: #00d2ff; }
        .badge-user { background: rgba(255, 255, 255, 0.08); color: #8892b0; }
        .badge-authentik { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        .badge-local { background: rgba(255, 165, 0, 0.15); color: #ffa500; }

        .last-login { color: #5a6380; font-size: 0.8rem; }

        .btn {
            padding: 0.5rem 1rem; border: none; border-radius: 8px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d2ff, #0077b6); color: #fff;
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.25);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0, 210, 255, 0.35); }
        .btn-danger { background: rgba(255, 59, 48, 0.15); color: #ff6b6b; border: 1px solid rgba(255, 59, 48, 0.2); }
        .btn-danger:hover { background: rgba(255, 59, 48, 0.25); }
        .btn-ghost { background: rgba(255, 255, 255, 0.06); color: #c8d6e5; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-ghost:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        .btn-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        .auth-info {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem; border-radius: 10px;
            background: rgba(0, 255, 136, 0.06);
            border: 1px solid rgba(0, 255, 136, 0.12);
            margin-bottom: 1rem; font-size: 0.85rem; color: #8892b0;
        }
        .auth-info .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #00ff88; flex-shrink: 0;
        }
        .auth-info strong { color: #e0e0e0; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #16213e; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 2rem; width: 100%; max-width: 440px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        }
        .modal h2 { font-size: 1.2rem; color: #fff; margin-bottom: 1rem; }
        .modal .form-group { margin-bottom: 1rem; }
        .modal .form-group label {
            display: block; color: #8892b0; font-size: 0.8rem;
            margin-bottom: 0.3rem; font-weight: 500;
        }
        .modal .form-group input, .modal .form-group select {
            width: 100%; padding: 0.6rem 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; color: #fff;
            font-size: 0.9rem; font-family: inherit; outline: none;
        }
        .modal .form-group input:focus, .modal .form-group select:focus {
            border-color: rgba(0, 210, 255, 0.5);
        }
        .modal .form-group select option { background: #16213e; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

        .msg {
            padding: 0.7rem 1rem; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 1rem; display: none;
        }
        .msg-success { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); color: #00ff88; }
        .msg-error { background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.3); color: #ff6b6b; }

        .groups-list { color: #5a6380; font-size: 0.75rem; max-width: 200px; word-break: break-word; }

        @media (max-width: 700px) {
            .content { padding: 5rem 1rem 1.5rem; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <img src="/admin/logo.png" alt="MoreNET" class="top-logo">
        <div class="top-right">
            <a href="/" class="nav-link">← Dashboard</a>
            <a href="/admin" class="nav-link active">Admin</a>
            <a href="#" onclick="logout()" class="nav-link logout">Logout</a>
            <img src="/admin/nex.png" alt="NEX" class="top-avatar">
        </div>
    </header>

    <div class="content">
        <h1><span>⚡</span> Admin Panel</h1>
        <p class="page-subtitle">User management &amp; access control</p>

        <div class="auth-info" id="authInfo">
            <div class="dot"></div>
            <span>Authentication: <strong id="authMode">loading...</strong></span>
        </div>

        <!-- Tabs -->
        <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;">
            <button class="btn btn-ghost" id="tabUsers" onclick="showTab('users')" style="border-color:rgba(0,210,255,0.4);color:#00d2ff;">👥 Users</button>
            <button class="btn btn-ghost" id="tabChats" onclick="showTab('chats')">💬 Chat History</button>
            <button class="btn btn-ghost" id="tabEscalations" onclick="showTab('escalations')">🔔 Escalations</button>
        </div>

        <!-- Users List -->
        <div class="card" id="sectionUsers">
            <div class="card-title"><span class="icon">👥</span> Users <span id="userCount" style="color:#5a6380;font-size:0.8rem;font-weight:400;"></span></div>
            <div class="msg msg-success" id="tableSuccess"></div>
            <div class="msg msg-error" id="tableError"></div>
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th class="hide-mobile">Auth</th>
                        <th class="hide-mobile">Last Login</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>
    </div>

        <!-- Chat History -->
        <div class="card" id="sectionChats" style="display:none;">
            <div class="card-title"><span class="icon">💬</span> Chat History</div>
            <div id="chatsList"></div>
            <div id="chatDetail" style="display:none;">
                <button class="btn btn-ghost btn-sm" onclick="backToChats()" style="margin-bottom:1rem;">← Back to list</button>
                <div id="chatDetailContent"></div>
            </div>
        </div>

        <!-- Escalations -->
        <div class="card" id="sectionEscalations" style="display:none;">
            <div class="card-title"><span class="icon">🔔</span> Escalations</div>
            <div id="escalationsList"></div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>✏️ Edit User</h2>
            <form id="editUserForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Email <span style="color:#5a6380;font-weight:400;">(managed by Authentik)</span></label>
                    <input type="email" id="editEmail" disabled style="opacity:0.5;">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="editRole">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group" id="editGroupsContainer" style="display:none;">
                    <label>Authentik Groups</label>
                    <div id="editGroups" class="groups-list" style="padding:0.5rem 0;"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;
        let allUsers = [];

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function showMsg(id, text, duration = 4000) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', duration);
        }

        function formatDate(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            return d.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' })
                + ' ' + d.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
        }

        async function api(method, url, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // ── Load ─────────────────────────────────────────
        async function loadAuthInfo() {
            const info = await api('GET', '/api/auth-info');
            document.getElementById('authMode').textContent =
                info.mode === 'authentik' ? `Authentik SSO (${info.authentikUrl})` : 'Local (dev mode)';
        }

        async function loadMe() {
            currentUser = await api('GET', '/api/me');
        }

        async function loadUsers() {
            allUsers = await api('GET', '/api/users');
            const tbody = document.getElementById('usersBody');
            document.getElementById('userCount').textContent = `(${allUsers.length})`;

            tbody.innerHTML = allUsers.map(u => `
                <tr>
                    <td>${esc(u.name || '—')}</td>
                    <td>${esc(u.email)}</td>
                    <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role}</span></td>
                    <td class="hide-mobile"><span class="badge ${u.auth === 'authentik' ? 'badge-authentik' : 'badge-local'}">${u.auth || 'local'}</span></td>
                    <td class="hide-mobile"><span class="last-login">${formatDate(u.last_login)}</span></td>
                    <td>
                        <div class="btn-row">
                            <button class="btn btn-ghost btn-sm" onclick="openEditModal(${u.id})">Edit</button>
                            ${u.id !== currentUser.id
                                ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${esc(u.email)}')">Delete</button>`
                                : '<span style="color:#5a6380;font-size:0.75rem;">(you)</span>'}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ── Edit Modal ───────────────────────────────────
        function openEditModal(id) {
            const u = allUsers.find(u => u.id === id);
            if (!u) return;
            document.getElementById('editId').value = u.id;
            document.getElementById('editName').value = u.name || '';
            document.getElementById('editEmail').value = u.email;
            document.getElementById('editRole').value = u.role;
            document.getElementById('editRole').disabled = (u.id === currentUser.id);

            const groupsContainer = document.getElementById('editGroupsContainer');
            if (u.groups && u.groups.length > 0) {
                document.getElementById('editGroups').textContent = u.groups.join(', ');
                groupsContainer.style.display = 'block';
            } else {
                groupsContainer.style.display = 'none';
            }

            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeEditModal();
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeEditModal(); });

        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            try {
                await api('PUT', `/api/users/${id}`, {
                    name: document.getElementById('editName').value,
                    role: document.getElementById('editRole').value,
                });
                closeEditModal();
                showMsg('tableSuccess', 'User updated ✓');
                loadUsers();
            } catch (err) { alert(err.message); }
        });

        // ── Delete ───────────────────────────────────────
        async function deleteUser(id, email) {
            if (!confirm(`Delete user ${email}? They can log in again via Authentik (will be re-created as default role).`)) return;
            try {
                await api('DELETE', `/api/users/${id}`);
                showMsg('tableSuccess', `${email} removed`);
                loadUsers();
            } catch (err) { showMsg('tableError', err.message); }
        }

        // ── Tabs ─────────────────────────────────────────
        function showTab(tab) {
            ['users', 'chats', 'escalations'].forEach(t => {
                document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? 'block' : 'none';
                const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
                if (t === tab) {
                    btn.style.borderColor = 'rgba(0,210,255,0.4)';
                    btn.style.color = '#00d2ff';
                } else {
                    btn.style.borderColor = '';
                    btn.style.color = '';
                }
            });
            if (tab === 'chats') loadChats();
            if (tab === 'escalations') loadEscalations();
        }

        // ── Chat History ─────────────────────────────────
        async function loadChats() {
            try {
                const chats = await api('GET', '/api/admin/chats?limit=100');
                const el = document.getElementById('chatsList');
                document.getElementById('chatDetail').style.display = 'none';
                el.style.display = 'block';
                if (!chats.length) {
                    el.innerHTML = '<p style="color:#5a6380;">No chat history yet.</p>';
                    return;
                }
                el.innerHTML = '<table class="user-table"><thead><tr><th>User</th><th>Date</th><th>Messages</th><th>Last Activity</th><th></th></tr></thead><tbody>' +
                    chats.map(c => `<tr>
                        <td>${esc(c.userId || '?')}</td>
                        <td>${esc(c.date || '?')}</td>
                        <td>${c.messageCount || 0}</td>
                        <td><span class="last-login">${c.lastMessage ? formatDate(c.lastMessage) : '—'}</span></td>
                        <td><button class="btn btn-ghost btn-sm" onclick="viewChat('${esc(c.file.replace('.json',''))}')">View</button></td>
                    </tr>`).join('') + '</tbody></table>';
            } catch (err) { console.error(err); }
        }

        async function viewChat(filename) {
            try {
                const data = await api('GET', `/api/admin/chats/${filename}`);
                document.getElementById('chatsList').style.display = 'none';
                const detail = document.getElementById('chatDetail');
                detail.style.display = 'block';
                const content = document.getElementById('chatDetailContent');

                content.innerHTML = '<p style="color:#8892b0;margin-bottom:1rem;font-size:0.85rem;">User: <strong style="color:#fff;">' + esc(data.userId) + '</strong> | Date: ' + esc(data.date) + ' | Messages: ' + data.messages.length + '</p>';

                data.messages.forEach(m => {
                    const div = document.createElement('div');
                    div.style.cssText = 'margin-bottom:0.75rem;padding:0.6rem 0.8rem;border-radius:8px;font-size:0.88rem;';
                    if (m.role === 'user') {
                        div.style.background = 'rgba(255,255,255,0.06)';
                        div.style.borderLeft = '3px solid #8892b0';
                        div.innerHTML = '<span style="color:#8892b0;font-size:0.75rem;">' + formatDate(m.timestamp) + ' — ' + esc(m.userName || 'User') + '</span><br>' + esc(m.content);
                    } else if (m.role === 'assistant') {
                        div.style.background = 'rgba(0,210,255,0.06)';
                        div.style.borderLeft = '3px solid #00d2ff';
                        div.innerHTML = '<span style="color:#00d2ff;font-size:0.75rem;">' + formatDate(m.timestamp) + ' — NEX' + (m.model ? ' (' + esc(m.model) + ')' : '') + '</span><br><div style="white-space:pre-wrap;">' + esc(m.content) + '</div>';
                    } else if (m.role === 'tool') {
                        div.style.background = 'rgba(255,165,0,0.06)';
                        div.style.borderLeft = '3px solid #ffa500';
                        div.style.fontSize = '0.8rem';
                        div.innerHTML = '<span style="color:#ffa500;font-size:0.72rem;">' + formatDate(m.timestamp) + ' — Tool: ' + esc(m.tool || '?') + '</span><br><code style="font-size:0.78rem;color:#8892b0;">' + esc(JSON.stringify(m.args || {})) + '</code><details style="margin-top:0.3rem;"><summary style="color:#5a6380;cursor:pointer;font-size:0.78rem;">Result</summary><pre style="font-size:0.75rem;max-height:200px;overflow:auto;margin-top:0.3rem;color:#8892b0;white-space:pre-wrap;">' + esc(m.result || '') + '</pre></details>';
                    } else if (m.role === 'error') {
                        div.style.background = 'rgba(255,59,48,0.06)';
                        div.style.borderLeft = '3px solid #ff6b6b';
                        div.innerHTML = '<span style="color:#ff6b6b;font-size:0.75rem;">' + formatDate(m.timestamp) + ' — Error</span><br><code style="color:#ff6b6b;">' + esc(m.content) + '</code>';
                    }
                    content.appendChild(div);
                });
            } catch (err) { console.error(err); }
        }

        function backToChats() {
            document.getElementById('chatDetail').style.display = 'none';
            document.getElementById('chatsList').style.display = 'block';
        }

        // ── Escalations ──────────────────────────────────
        async function loadEscalations() {
            try {
                const data = await api('GET', '/api/admin/escalations');
                const el = document.getElementById('escalationsList');
                if (!data.length) {
                    el.innerHTML = '<p style="color:#5a6380;">No escalations yet.</p>';
                    return;
                }
                el.innerHTML = data.map(e => `<div style="margin-bottom:0.75rem;padding:0.6rem 0.8rem;border-radius:8px;background:rgba(255,165,0,0.06);border-left:3px solid #ffa500;font-size:0.88rem;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span style="color:#ffa500;font-size:0.75rem;font-weight:600;">${formatDate(e.timestamp)}</span>
                        <span class="badge" style="background:rgba(255,165,0,0.15);color:#ffa500;">${esc(e.status)}</span>
                    </div>
                    <p style="margin-top:0.3rem;"><strong>Reason:</strong> ${esc(e.reason)}</p>
                    ${e.context ? '<p style="color:#8892b0;font-size:0.82rem;margin-top:0.2rem;"><strong>Context:</strong> ' + esc(e.context) + '</p>' : ''}
                    <code style="color:#5a6380;font-size:0.72rem;">ID: ${esc(e.id)}</code>
                </div>`).join('');
            } catch (err) { console.error(err); }
        }

        // ── Init ─────────────────────────────────────────
        Promise.all([loadMe(), loadAuthInfo()])
            .then(loadUsers)
            .catch(() => window.location.href = '/login');
    </script>
</body>
</html>
