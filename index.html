<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX — MoreNET Client Insights</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            background: #0f0f23;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 2rem;
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .top-logo {
            height: 40px;
            width: auto;
        }
        
        .top-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 210, 255, 0.4);
        }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 1.5rem 2rem;
            background: linear-gradient(135deg, #0f0f23 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }
        
        .main::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        /* NEX Intro */
        .nex-intro {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .nex-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.15);
            margin-bottom: 1rem;
            animation: glow 4s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 210, 255, 0.15); border-color: rgba(0, 210, 255, 0.4); }
            50% { box-shadow: 0 0 40px rgba(0, 210, 255, 0.3); border-color: rgba(0, 210, 255, 0.7); }
        }
        
        .nex-heading {
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        
        .nex-heading span {
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }
        
        .nex-subtitle {
            font-size: 1.05rem;
            color: #8892b0;
            font-style: italic;
        }
        
        /* Chat Box */
        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
        }
        
        .chat-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .chat-messages {
            padding: 1.5rem;
            min-height: 280px;
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .message-bubble {
            background: rgba(0, 210, 255, 0.08);
            border: 1px solid rgba(0, 210, 255, 0.15);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #c8d6e5;
        }
        
        .message-bubble strong {
            color: #00d2ff;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 0.25rem;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1rem;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #00d2ff;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        
        .chat-input-area {
            display: flex;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
        }
        
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 1.25rem;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
        }
        
        .chat-input::placeholder { color: #5a6380; }
        
        .chat-send {
            background: transparent;
            border: none;
            padding: 1rem 1.25rem;
            color: #00d2ff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .chat-send:hover { color: #fff; transform: scale(1.1); }
        
        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 0.4rem 0.9rem;
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 20px;
            color: #00ff88;
            font-size: 0.75rem;
            position: relative;
            z-index: 1;
        }
        
        .status-dot {
            width: 7px;
            height: 7px;
            background: #00ff88;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Footer */
        footer {
            background: rgba(10, 10, 26, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem;
            text-align: center;
            color: #5a6380;
            font-size: 0.8rem;
        }
        
        footer a { color: #00d2ff; text-decoration: none; }
    </style>
</head>
<body>
    <header class="top-bar">
        <img src="logo.png" alt="MoreNET" class="top-logo">
        <img src="nex.png" alt="NEX" class="top-avatar">
    </header>

    <main class="main">
        <div class="nex-intro">
            <img src="nex.png" alt="NEX" class="nex-avatar">
            <h1 class="nex-heading">Welcome to <span>NEX</span></h1>
            <p class="nex-subtitle">Your friendly NEXt level Client Insights Specialist</p>
        </div>

        <div class="chat-container">
            <div class="chat-box">
                <div class="chat-messages" id="chatMessages">
                    <div class="message">
                        <img src="nex.png" alt="NEX" class="message-avatar">
                        <div class="message-bubble">
                            <strong>NEX</strong>
                            Hey! I'm NEX, your MoreNET client insights specialist. Ask me anything about your account, services, or connectivity. ⚡
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Ask NEX something..." autocomplete="off">
                    <button class="chat-send" id="chatSend">➤</button>
                </div>
            </div>
        </div>

        <div class="status-badge">
            <span class="status-dot"></span>
            All systems operational
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MoreNET Internet Solutions. Powered by <span style="color: #00d2ff;">NEX</span> ⚡</p>
    </footer>

    <script>
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('chatSend');
        const messages = document.getElementById('chatMessages');

        function addMessage(text, sender = 'You') {
            const div = document.createElement('div');
            div.className = 'message';
            const isNex = sender === 'NEX';
            div.innerHTML = `
                ${isNex ? '<img src="nex.png" alt="NEX" class="message-avatar">' : ''}
                <div class="message-bubble" style="${!isNex ? 'margin-left: auto; background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1);' : ''}">
                    <strong style="${!isNex ? 'color: #8892b0;' : ''}">${sender}</strong>
                    ${text}
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message';
            div.id = 'typing';
            div.innerHTML = `
                <img src="nex.png" alt="NEX" class="message-avatar">
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        const responses = [
            "I can help with that! Let me pull up your account details. ⚡",
            "Checking the network status now — one moment.",
            "Great question! I'll look into that for you.",
            "I've got the intel you need. Let me compile that report.",
            "On it! Give me a second to check the system.",
            "That's within my scope — pulling the data now.",
        ];

        function handleSend() {
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'You');
            input.value = '';
            showTyping();
            setTimeout(() => {
                removeTyping();
                addMessage(responses[Math.floor(Math.random() * responses.length)], 'NEX');
            }, 1200 + Math.random() * 800);
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
