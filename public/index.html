<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX — MoreNET Client Insights</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            background: #0f0f23;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 2rem;
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .top-left { display: flex; align-items: center; gap: 0.75rem; }
        .top-logo { height: 40px; width: auto; }
        .hamburger {
            display: none;
            background: none; border: none; color: #8892b0;
            font-size: 1.4rem; cursor: pointer; padding: 0.25rem 0.5rem;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .top-bar-link {
            color: #8892b0;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .top-bar-link:hover { color: #00d2ff; background: rgba(0,210,255,0.08); }
        .top-bar-link.logout:hover { color: #ff6b6b; background: rgba(255,59,48,0.08); }

        .user-greeting {
            color: #8892b0;
            font-size: 0.85rem;
        }
        .user-greeting span { color: #00d2ff; font-weight: 600; }

        .top-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 210, 255, 0.4);
        }

        /* Layout: Sidebar + Main */
        .app-layout {
            display: flex;
            flex: 1;
            margin-top: 57px; /* top bar height */
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(10, 10, 26, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: calc(100vh - 57px);
            position: sticky;
            top: 57px;
        }

        .sidebar-header {
            padding: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .new-conv-btn {
            width: 100%;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.25);
            color: #00d2ff;
            padding: 0.55rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .new-conv-btn:hover { background: rgba(0, 210, 255, 0.18); }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .conv-item {
            display: flex;
            align-items: center;
            padding: 0.6rem 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            position: relative;
        }
        .conv-item:hover { background: rgba(0, 210, 255, 0.06); }
        .conv-item.active {
            background: rgba(0, 210, 255, 0.1);
            border-left-color: #00d2ff;
        }

        .conv-info { flex: 1; min-width: 0; }
        .conv-title {
            font-size: 0.83rem;
            color: #c8d6e5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-item.active .conv-title { color: #fff; }
        .conv-date {
            font-size: 0.7rem;
            color: #5a6380;
            margin-top: 0.15rem;
        }

        .conv-delete {
            display: none;
            background: none; border: none;
            color: #5a6380; cursor: pointer;
            font-size: 0.9rem; padding: 0.2rem 0.4rem;
            border-radius: 4px; transition: all 0.15s;
            flex-shrink: 0;
        }
        .conv-delete:hover { color: #ff6b6b; background: rgba(255,59,48,0.1); }
        .conv-item:hover .conv-delete { display: block; }

        .conv-empty {
            padding: 1.5rem;
            text-align: center;
            color: #5a6380;
            font-size: 0.82rem;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, #0f0f23 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
            min-height: calc(100vh - 57px);
        }

        .main::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* NEX Intro — collapsible */
        .nex-intro {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 1.5rem;
            transition: all 0.4s ease;
        }

        .nex-intro.compact { margin-bottom: 1rem; }
        .nex-intro.compact .nex-avatar { width: 60px; height: 60px; }
        .nex-intro.compact .nex-heading { font-size: 1.4rem; }
        .nex-intro.compact .nex-subtitle { display: none; }

        .nex-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.15);
            margin-bottom: 0.75rem;
            animation: glow 4s ease-in-out infinite;
            transition: all 0.4s ease;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 210, 255, 0.15); border-color: rgba(0, 210, 255, 0.4); }
            50% { box-shadow: 0 0 40px rgba(0, 210, 255, 0.3); border-color: rgba(0, 210, 255, 0.7); }
        }

        .nex-heading {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.4rem;
            transition: font-size 0.4s ease;
        }

        .nex-heading span { color: #00d2ff; text-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }

        .nex-subtitle {
            font-size: 1rem;
            color: #8892b0;
            font-style: italic;
        }

        /* Quick Start Suggestions */
        .quick-start {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.25rem;
            max-width: 640px;
            transition: opacity 0.3s ease;
        }

        .quick-start.hidden { display: none; }

        .quick-btn {
            background: rgba(0, 210, 255, 0.06);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            padding: 0.45rem 1rem;
            color: #8892b0;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .quick-btn:hover {
            background: rgba(0, 210, 255, 0.12);
            color: #00d2ff;
            border-color: rgba(0, 210, 255, 0.4);
            transform: translateY(-1px);
        }

        .quick-btn .icon { margin-right: 0.3rem; }

        /* Chat Box */
        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chat-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .chat-messages {
            padding: 1.25rem;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 250px;
            max-height: 65vh;
        }

        .message {
            display: flex;
            gap: 0.65rem;
            align-items: flex-start;
            animation: fadeIn 0.35s ease;
        }

        .message.no-anim { animation: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message-bubble {
            background: rgba(0, 210, 255, 0.08);
            border: 1px solid rgba(0, 210, 255, 0.15);
            border-radius: 12px;
            padding: 0.65rem 0.9rem;
            max-width: 88%;
            font-size: 0.92rem;
            line-height: 1.55;
            color: #c8d6e5;
            overflow-x: auto;
        }

        .message-bubble.user-bubble {
            margin-left: auto;
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
        }

        .message-bubble .sender {
            color: #00d2ff;
            font-size: 0.78rem;
            font-weight: 600;
            display: block;
            margin-bottom: 0.2rem;
        }

        .message-bubble.user-bubble .sender { color: #8892b0; }

        /* Markdown content styles */
        .message-bubble table {
            border-collapse: collapse;
            margin: 0.5rem 0;
            font-size: 0.85rem;
            width: 100%;
            overflow-x: auto;
            display: block;
        }

        .message-bubble th, .message-bubble td {
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 0.4rem 0.6rem;
            text-align: left;
        }

        .message-bubble th {
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .message-bubble tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }

        .message-bubble pre {
            background: rgba(0, 0, 0, 0.35);
            padding: 0.75rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-size: 0.83rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            line-height: 1.45;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .message-bubble code {
            background: rgba(0, 210, 255, 0.1);
            padding: 0.12rem 0.35rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .message-bubble pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        .message-bubble a {
            color: #00d2ff;
            text-decoration: underline;
            text-decoration-color: rgba(0, 210, 255, 0.3);
            transition: text-decoration-color 0.2s;
        }

        .message-bubble a:hover { text-decoration-color: #00d2ff; }

        .message-bubble ul, .message-bubble ol {
            margin: 0.4rem 0;
            padding-left: 1.5rem;
        }

        .message-bubble li { margin: 0.2rem 0; }

        .message-bubble blockquote {
            border-left: 3px solid rgba(0, 210, 255, 0.4);
            padding-left: 0.75rem;
            margin: 0.4rem 0;
            color: #8892b0;
        }

        .message-bubble h3, .message-bubble h4 {
            color: #fff;
            margin: 0.5rem 0 0.25rem;
        }

        .message-bubble h3 { font-size: 1rem; }
        .message-bubble h4 { font-size: 0.92rem; }

        .message-bubble hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0.5rem 0;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem 0;
            align-items: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #00d2ff;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* Input Area */
        .chat-input-area {
            display: flex;
            align-items: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.6rem 0.75rem;
            color: #fff;
            font-size: 0.92rem;
            outline: none;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            line-height: 1.4;
            overflow-y: auto;
        }

        .chat-input::placeholder { color: #5a6380; }

        .chat-send {
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid rgba(0, 210, 255, 0.3);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            color: #00d2ff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-send:hover { background: rgba(0, 210, 255, 0.25); color: #fff; }
        .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.35rem 0.85rem;
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 20px;
            color: #00ff88;
            font-size: 0.72rem;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }

        .status-badge.error {
            background: rgba(255, 59, 48, 0.08);
            border-color: rgba(255, 59, 48, 0.15);
            color: #ff6b6b;
        }

        .status-badge.error .status-dot { background: #ff6b6b; }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Footer */
        footer {
            background: rgba(10, 10, 26, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            text-align: center;
            color: #5a6380;
            font-size: 0.78rem;
        }

        /* Mobile overlay for sidebar */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 57px; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 49;
        }
        .sidebar-overlay.active { display: block; }

        /* Mobile */
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .sidebar {
                position: fixed;
                top: 57px; left: 0; bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
            }
            .sidebar.open { transform: translateX(0); }
            .main { padding: 1.5rem 0.75rem; }
            .nex-heading { font-size: 1.6rem; }
            .nex-avatar { width: 70px; height: 70px; }
            .chat-messages { padding: 1rem; max-height: 55vh; }
            .message-bubble { max-width: 92%; font-size: 0.88rem; }
            .quick-btn { font-size: 0.78rem; padding: 0.4rem 0.8rem; }
            .user-greeting { display: none; }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="top-left">
            <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
            <img src="logo.png" alt="MoreNET" class="top-logo">
        </div>
        <div class="top-bar-right">
            <span class="user-greeting" id="userGreeting"></span>
            <a href="/admin" id="adminLink" style="display:none" class="top-bar-link">Admin</a>
            <a href="#" onclick="logout()" class="top-bar-link logout">Logout</a>
            <img src="nex.png" alt="NEX" class="top-avatar">
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-conv-btn" onclick="newConversation()">✦ New conversation</button>
            </div>
            <div class="conv-list" id="convList">
                <div class="conv-empty">Loading...</div>
            </div>
        </aside>

        <div class="main-wrapper" style="flex:1;display:flex;flex-direction:column;">
            <main class="main">
                <div class="nex-intro" id="nexIntro">
                    <img src="nex.png" alt="NEX" class="nex-avatar">
                    <h1 class="nex-heading">Welcome to <span>NEX</span></h1>
                    <p class="nex-subtitle">Your friendly NEXt level Client Insights Specialist</p>
                </div>

                <div class="quick-start" id="quickStart">
                    <button class="quick-btn" onclick="sendQuick('Show me all open tickets')"><span class="icon">🎫</span> Open tickets</button>
                    <button class="quick-btn" onclick="sendQuick('Show queue statistics')"><span class="icon">📊</span> Queue stats</button>
                    <button class="quick-btn" onclick="sendQuick('Search for a customer')"><span class="icon">👤</span> Find customer</button>
                    <button class="quick-btn" onclick="sendQuick('Search documentation')"><span class="icon">📖</span> Search docs</button>
                </div>

                <div class="chat-container">
                    <div class="chat-box">
                        <div class="chat-messages" id="chatMessages">
                            <div class="message">
                                <img src="nex.png" alt="NEX" class="message-avatar">
                                <div class="message-bubble">
                                    <span class="sender">NEX</span>
                                    Hey! I'm NEX, your MoreNET client insights specialist. Ask me anything about tickets, customers, or documentation. ⚡
                                </div>
                            </div>
                        </div>
                        <div class="chat-input-area">
                            <textarea class="chat-input" id="chatInput" placeholder="Ask NEX something..." rows="1"></textarea>
                            <button class="chat-send" id="chatSend" title="Send">➤</button>
                        </div>
                    </div>
                </div>

                <div class="status-badge" id="statusBadge">
                    <span class="status-dot"></span>
                    <span id="statusText">Checking...</span>
                </div>
            </main>

            <footer>
                <p>&copy; 2026 MoreNET Internet Solutions. Powered by <span style="color: #00d2ff;">NEX</span> ⚡</p>
            </footer>
        </div>
    </div>

    <script>
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('chatSend');
        const messagesEl = document.getElementById('chatMessages');
        const quickStart = document.getElementById('quickStart');
        const nexIntro = document.getElementById('nexIntro');
        const convListEl = document.getElementById('convList');
        let userName = 'You';
        let sending = false;
        let userScrolledUp = false;
        let messageCount = 0;
        let currentConversationId = null;
        let conversations = [];

        // Track scroll position
        messagesEl.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = messagesEl;
            userScrolledUp = (scrollHeight - scrollTop - clientHeight) > 60;
        });

        // Auto-resize textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        });

        // Sidebar toggle (mobile)
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        // Fetch user info
        fetch('/api/me').then(r => r.json()).then(u => {
            if (u.name) {
                userName = u.name;
                document.getElementById('userGreeting').innerHTML = 'Hi, <span>' + escapeHtml(u.name.split(' ')[0]) + '</span>';
            }
            if (u.role === 'admin') document.getElementById('adminLink').style.display = 'inline';
        }).catch(() => {});

        // Check health status
        fetch('/health').then(r => r.json()).then(d => {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            if (d.status === 'ok') {
                text.textContent = 'All systems operational';
            } else {
                badge.classList.add('error');
                text.textContent = 'System issues detected';
            }
        }).catch(() => {
            document.getElementById('statusBadge').classList.add('error');
            document.getElementById('statusText').textContent = 'Connection error';
        });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function scrollToBottom() {
            if (!userScrolledUp) {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
        }

        function relativeTime(isoStr) {
            if (!isoStr) return '';
            const diff = Date.now() - new Date(isoStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 7) return days + 'd ago';
            return new Date(isoStr).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' });
        }

        // ── Conversation List ───────────────────────────
        async function loadConversations() {
            try {
                const res = await fetch('/api/chat/conversations');
                conversations = await res.json();
                renderConversationList();
            } catch (err) {
                convListEl.innerHTML = '<div class="conv-empty">Failed to load</div>';
            }
        }

        function renderConversationList() {
            if (!conversations.length) {
                convListEl.innerHTML = '<div class="conv-empty">No conversations yet.<br>Start one below!</div>';
                return;
            }
            convListEl.innerHTML = conversations.map(c => `
                <div class="conv-item ${c.id === currentConversationId ? 'active' : ''}"
                     onclick="loadConversation('${c.id}')" data-id="${c.id}">
                    <div class="conv-info">
                        <div class="conv-title">${escapeHtml(c.title || 'New conversation')}</div>
                        <div class="conv-date">${relativeTime(c.updatedAt)} · ${c.messageCount} msgs</div>
                    </div>
                    <button class="conv-delete" onclick="event.stopPropagation();deleteConversation('${c.id}')" title="Delete">✕</button>
                </div>
            `).join('');
        }

        async function loadConversation(convId) {
            currentConversationId = convId;
            renderConversationList();

            // Close sidebar on mobile
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');

            // Show compact intro
            nexIntro.classList.add('compact');
            quickStart.classList.add('hidden');

            // Clear messages
            messagesEl.innerHTML = '';
            messageCount = 0;

            try {
                const res = await fetch(`/api/chat/history/${convId}`);
                const data = await res.json();

                if (data.messages && data.messages.length > 0) {
                    for (const msg of data.messages) {
                        if (msg.role === 'tool') continue; // Skip tool messages
                        if (msg.role === 'error') continue;
                        const sender = msg.role === 'user' ? (msg.userName || userName) : 'NEX';
                        const html = msg.role === 'user' ? escapeHtml(msg.content || '') : formatMarkdown(msg.content || '');
                        addMessage(html, sender, true); // true = no animation
                    }
                } else {
                    addWelcomeMessage();
                }
            } catch (err) {
                addMessage('Failed to load conversation history.', 'NEX');
            }

            // Force scroll to bottom after loading
            userScrolledUp = false;
            scrollToBottom();
            input.focus();
        }

        async function deleteConversation(convId) {
            if (!confirm('Delete this conversation?')) return;
            try {
                await fetch(`/api/chat/conversations/${convId}`, { method: 'DELETE' });
                if (currentConversationId === convId) {
                    currentConversationId = null;
                    resetToWelcome();
                }
                await loadConversations();
            } catch (err) {
                console.error('Delete failed:', err);
            }
        }

        function addMessage(html, sender, noAnimation) {
            messageCount++;
            const isNex = sender === 'NEX';
            const div = document.createElement('div');
            div.className = 'message' + (noAnimation ? ' no-anim' : '');
            div.innerHTML = `
                ${isNex ? '<img src="nex.png" alt="NEX" class="message-avatar">' : ''}
                <div class="message-bubble ${isNex ? '' : 'user-bubble'}">
                    <span class="sender">${escapeHtml(sender)}</span>
                    <div class="message-content">${html}</div>
                </div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();

            // Compact the intro after messages
            if (messageCount > 1) {
                nexIntro.classList.add('compact');
                quickStart.classList.add('hidden');
            }
        }

        function addWelcomeMessage() {
            const div = document.createElement('div');
            div.className = 'message no-anim';
            div.innerHTML = `
                <img src="nex.png" alt="NEX" class="message-avatar">
                <div class="message-bubble">
                    <span class="sender">NEX</span>
                    Hey! I'm NEX, your MoreNET client insights specialist. Ask me anything about tickets, customers, or documentation. ⚡
                </div>
            `;
            messagesEl.appendChild(div);
        }

        function resetToWelcome() {
            messagesEl.innerHTML = '';
            messageCount = 0;
            currentConversationId = null;
            nexIntro.classList.remove('compact');
            quickStart.classList.remove('hidden');
            addWelcomeMessage();
            renderConversationList();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message';
            div.id = 'typing';
            div.innerHTML = `
                <img src="nex.png" alt="NEX" class="message-avatar">
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        async function handleSend() {
            const text = input.value.trim();
            if (!text || sending) return;
            sending = true;
            addMessage(escapeHtml(text), userName);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;
            showTyping();

            try {
                const body = { message: text };
                if (currentConversationId) body.conversationId = currentConversationId;

                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                removeTyping();
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    addMessage(escapeHtml(err.error || 'Something went wrong. Please try again.'), 'NEX');
                } else {
                    const data = await res.json();
                    // Track conversation ID from server
                    if (data.conversationId && data.conversationId !== currentConversationId) {
                        currentConversationId = data.conversationId;
                        // Refresh sidebar to show new conversation
                        await loadConversations();
                    }
                    addMessage(formatMarkdown(data.reply || 'No response.'), 'NEX');
                }
            } catch (err) {
                removeTyping();
                addMessage('Connection error. Please try again.', 'NEX');
            } finally {
                sending = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function sendQuick(text) {
            input.value = text;
            handleSend();
        }

        function newConversation() {
            resetToWelcome();
            // Close sidebar on mobile
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            input.focus();
        }

        // ── Markdown Formatter ──────────────────────────────
        function formatMarkdown(text) {
            let html = escapeHtml(text);

            // Code blocks (``` ... ```)
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
                return '<pre><code>' + code.trim() + '</code></pre>';
            });

            // Inline code
            html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

            // Tables
            html = html.replace(/((?:^\|.+\|$\n?)+)/gm, (tableBlock) => {
                const rows = tableBlock.trim().split('\n').filter(r => r.trim());
                if (rows.length < 2) return tableBlock;

                const sepIdx = rows.findIndex(r => /^\|[\s\-:|]+\|$/.test(r.trim()));
                let headerRow = null;
                let dataRows = rows;

                if (sepIdx === 1) {
                    headerRow = rows[0];
                    dataRows = rows.slice(2);
                } else if (sepIdx === -1) {
                    headerRow = rows[0];
                    dataRows = rows.slice(1);
                }

                const parseCells = (row) => row.split('|').slice(1, -1).map(c => c.trim());
                let tableHtml = '<table>';

                if (headerRow) {
                    const headers = parseCells(headerRow);
                    tableHtml += '<thead><tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr></thead>';
                }

                tableHtml += '<tbody>';
                for (const row of dataRows) {
                    const cells = parseCells(row);
                    if (cells.length > 0 && cells.some(c => c)) {
                        tableHtml += '<tr>' + cells.map(c => '<td>' + c + '</td>').join('') + '</tr>';
                    }
                }
                tableHtml += '</tbody></table>';
                return tableHtml;
            });

            // Headers
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');

            // Horizontal rules
            html = html.replace(/^---+$/gm, '<hr>');

            // Bold
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Links: [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

            // Bare URLs
            html = html.replace(/(?<!["=])(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');

            // Ordered lists
            html = html.replace(/((?:^\d+\. .+$\n?)+)/gm, (block) => {
                const items = block.trim().split('\n').map(line => {
                    return '<li>' + line.replace(/^\d+\.\s+/, '') + '</li>';
                });
                return '<ol>' + items.join('') + '</ol>';
            });

            // Unordered lists
            html = html.replace(/((?:^[-*] .+$\n?)+)/gm, (block) => {
                const items = block.trim().split('\n').map(line => {
                    return '<li>' + line.replace(/^[-*]\s+/, '') + '</li>';
                });
                return '<ul>' + items.join('') + '</ul>';
            });

            // Blockquotes
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

            // Line breaks
            html = html.replace(/\n/g, '<br>');

            // Clean up extra breaks
            html = html.replace(/<\/(table|pre|ol|ul|blockquote|h[34]|hr)><br>/g, '</$1>');
            html = html.replace(/<br><(table|pre|ol|ul|blockquote|h[34]|hr)/g, '<$1');

            return html;
        }

        // ── Event Listeners ─────────────────────────────────
        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // ── Init ────────────────────────────────────────────
        (async function init() {
            await loadConversations();
            // Auto-load most recent conversation if exists
            if (conversations.length > 0) {
                await loadConversation(conversations[0].id);
            }
        })();
    </script>
</body>
</html>
